name: Deploy fanad.org (GitHub Pages)

# Publishes the fanaddotorg/ folder to GitHub Pages. Pages can't serve an arbitrary
# subfolder from a branch (only root or /docs), so this uploads it as the site root.
on:
  push:
    branches: [main]
    paths:
      - 'fanaddotorg/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: fanaddotorg
      - id: deployment
        uses: actions/deploy-pages@v4
